name: Build and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Run Build Check
        run: |
          echo "Checking disk space..."
          df -h
          echo "Cleaning npm cache..."
          npm cache clean --force
          echo "Checking application build suitability..."
          npm ci
          npm run build

  deploy-staging:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Revision Env Var
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TIMESTAMP=$(date +'%Y%m%d-%H%M%S')
          echo "REVISION=${SHORT_SHA}-${TIMESTAMP}" >> $GITHUB_ENV

      - name: Trigger Kaniko Build in K3s
        run: |
          # 1. Create a namespace for build if it doesn't exist
          kubectl create namespace build --dry-run=client -o yaml | kubectl apply -f -
          
          # 2. Generate the Kaniko Job manifest
          # We mount the workspace hostPath so Kaniko doesn't need external git access.
          cat <<EOF > kaniko-job.yaml
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: kaniko-build-homepage-${{ github.sha }}
            namespace: build
          spec:
            template:
              spec:
                containers:
                - name: kaniko
                  image: gcr.io/kaniko-project/executor:latest
                  args:
                  - "--context=dir:///workspace"
                  - "--dockerfile=Dockerfile"
                  - "--destination=registry.registry.svc.cluster.local:5000/homepage:${{ env.REVISION }}"
                  - "--insecure"
                  volumeMounts:
                  - name: project-source
                    mountPath: /workspace
                restartPolicy: Never
                volumes:
                - name: project-source
                  hostPath:
                    path: ${{ github.workspace }}
          EOF
          
          # 3. Apply the Job and wait for completion
          kubectl apply -f kaniko-job.yaml
          echo "Waiting for Kaniko build to finish..."
          kubectl wait --namespace build --for=condition=complete --timeout=15m job/kaniko-build-homepage-${{ github.sha }}
          
          # 4. Clean up the Job resource
          kubectl delete -f kaniko-job.yaml

      - name: Update GitOps Service Catalog
        run: |
          # To update the service-catalog, we need a GitHub Personal Access Token (PAT).
          # Ensure you add a Repository Secret called 'CATALOG_PAT' with 'repo' scope.
          git config --global user.email "runner@hafidzilkhairi.my.id"
          git config --global user.name "GitHub Actions Runner"
          
          echo "Cloning service-catalog GitOps repository..."
          rm -rf my-setup-service-catalog
          git clone https://x-access-token:${{ secrets.CATALOG_PAT }}@github.com/hafidzilkhairi/my-setup-service-catalog.git
          cd my-setup-service-catalog/staging/homepage
          
          # Update the release.yaml image and revision annotation
          sed -i "s|image: registry.registry.svc.cluster.local:5000/homepage:.*|image: registry.registry.svc.cluster.local:5000/homepage:${{ env.REVISION }}|" release.yaml
          sed -i "s|revision: .*|revision: ${{ env.REVISION }}|" release.yaml
          
          git add release.yaml
          git commit -m "ci: update homepage image and revision to ${{ env.REVISION }} [skip ci]"
          git push origin main
